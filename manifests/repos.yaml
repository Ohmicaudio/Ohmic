version: 1
owner: Ohmicaudio
umbrella_repo: Ohmic
# Active local repo homes live under /mnt/b/ohmic/repos.
# Legacy pre-migration copies must not be used as active work roots.

repos:
  - name: Ohmic
    kind: umbrella
    visibility: private
    source_of_truth: true
    purpose:
      - architecture
      - contracts-index
      - migration
      - repo-registry
      - generated-context
      - docker-context-tooling
    local_path: /mnt/b/ohmic

  - name: ohmic-audio-labs
    kind: app-runtime
    visibility: private
    preserve_history: true
    source_local_path: /mnt/b/ohmic/repos/ohmic-audio-labs
    mirror_local_path: /mnt/b/ohmic/repos/ohmic-audio-labs
    import_surface_manifest: /mnt/b/ohmic/manifests/import-surfaces/ohmic-audio-labs.yaml
    readme_template: /mnt/b/ohmic/templates/repo-bootstrap/README.ohmic-audio-labs.md
    purpose:
      - web
      - android-shell
      - backend
      - sync-hub
      - measurement-pipeline
      - shared-app-core

  - name: ohmic-audio-static-content
    kind: static-content
    visibility: private
    preserve_history: false
    source_local_path: /mnt/b/ohmic/repos/ohmic-audio-static-content
    mirror_local_path: /mnt/b/ohmic/repos/ohmic-audio-static-content
    import_surface_manifest: /mnt/b/ohmic/manifests/import-surfaces/ohmic-audio-static-content.yaml
    readme_template: /mnt/b/ohmic/templates/repo-bootstrap/README.ohmic-audio-static-content.md
    purpose:
      - static-site-content
      - generated-public-pages
      - seo-landing-content
      - content-operations

  - name: amplab-firmware
    kind: firmware
    visibility: private
    preserve_history: false
    source_local_path: /mnt/b/ohmic/repos/amplab-firmware
    mirror_local_path: /mnt/b/ohmic/repos/amplab-firmware
    import_surface_manifest: /mnt/b/ohmic/manifests/import-surfaces/amplab-firmware.yaml
    readme_template: /mnt/b/ohmic/templates/repo-bootstrap/README.ohmic-amplab-firmware.md
    purpose:
      - amplab-device-firmware
      - dsp-transport
      - device-web-api
      - measurement-jobs

  - name: cyd-remote
    kind: handheld
    visibility: private
    preserve_history: false
    source_local_path: /mnt/b/ohmic/repos/cyd-remote
    mirror_local_path: /mnt/b/ohmic/repos/cyd-remote
    import_surface_manifest: /mnt/b/ohmic/manifests/import-surfaces/cyd-remote.yaml
    readme_template: /mnt/b/ohmic/templates/repo-bootstrap/README.ohmic-cyd-remote.md
    purpose:
      - handheld-firmware
      - display-stack
      - handheld-ui
      - cyd-bringup

  - name: hardware-specs
    kind: hardware
    visibility: private
    preserve_history: false
    source_local_path: /mnt/b/ohmic/repos/hardware-specs
    mirror_local_path: /mnt/b/ohmic/repos/hardware-specs
    purpose:
      - hardware-planning
      - electrical-architecture
      - schematic-capture
      - pcb-layout
      - bringup
      - manufacturing
