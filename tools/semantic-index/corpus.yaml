collection: ohmic_context

repos:
  - name: Ohmic
    kind: umbrella
    root: /mnt/b/ohmic
    include:
      - README.md
      - agent-system/**/*.md
      - docs/**/*.md
      - manifests/**/*.yaml
      - templates/**/*.md
    exclude:
      - repos/**

  - name: ohmic-audio-labs
    kind: app-runtime
    root: /mnt/b/ohmic/repos/ohmic-audio-labs
    include:
      - AGENTS.md
      - README.md
      - docs/**/*.md
      - schemas/**/*.json
      - services/**/*.md
      - products/**/*.md
      - index/**/*.md
      - index/**/*.json
    exclude:
      - archive/**
      - "**/archive/**"
      - dist/**
      - "**/dist/**"
      - node_modules/**
      - "**/node_modules/**"
      - .pio/**
      - "**/.pio/**"
      - playwright-report/**
      - "**/playwright-report/**"
      - test-results/**
      - "**/test-results/**"

  - name: amplab-firmware
    kind: firmware
    root: /mnt/b/ohmic/repos/amplab-firmware
    include:
      - README.md
      - docs/**/*.md
      - schemas/**/*.json
      - src/**/*.md
      - src/**/*.hpp
      - src/**/*.cpp
      - include/**/*.h
      - include/**/*.hpp
    exclude:
      - .pio/**
      - "**/.pio/**"

  - name: cyd-remote
    kind: handheld
    root: /mnt/b/ohmic/repos/cyd-remote
    include:
      - AGENTS.md
      - README.md
      - docs/CYD24R_BRINGUP_AND_WORKING_GUIDE_2026-03-12.md
      - docs/CYD_HANDHELD_PRODUCT_BRIEF.md
      - docs/PINOUT_CANONICAL_V1.md
      - docs/OHMIC_CANONICAL_DEVICE_CONTRACT_DRAFT_2026-03-12.md
      - docs/OHMIC_SYSTEM_FIRMWARE_ROAD_FORWARD_2026-03-12.md
      - docs/OHMIC_WEB_ANDROID_AND_FIRMWARE_CONSOLIDATION_2026-03-12.md
      - docs/ohmic-firmware-handoff/**/*.md
      - schemas/**/*.json
      - src/**/*.hpp
      - src/**/*.cpp
      - include/**/*.h
      - include/**/*.hpp
    exclude:
      - .pio/**
      - "**/.pio/**"
      - docs/archive/**
      - "**/docs/archive/**"
      - docs/2.4inch_ESP32-2432S024/**
      - "**/docs/2.4inch_ESP32-2432S024/**"
      - docs/adi docs/**
      - "**/docs/adi docs/**"
      - snapshots/**
      - "**/snapshots/**"
      - skills/**
      - "**/skills/**"

  - name: ohmic-audio-static-content
    kind: static-content
    root: /mnt/b/ohmic/repos/ohmic-audio-static-content
    include:
      - README.md
      - content-work/**/*.md
      - site/**/*.md
      - public/llms.txt
      - public/suite-index.json
      - public/ai-index.json
    exclude: []
