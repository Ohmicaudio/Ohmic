version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: ohmic-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    restart: unless-stopped

volumes:
  chroma-data:
    name: ohmic-chroma-data
